engine: nixery
when:
  - event: [pull_request]
    branch: [main]
  - event: [push, manual]
    branch: [main]
clone:
  depth: 1
  submodules: false
dependencies:
  nixpkgs:
    - cabal-install
    - haskell.compiler.ghc912
    - hlint
    - ormolu
    - rustup
    - protobuf
    - pkg-config
    - zlib
steps:
  - name: "Mergepath: verify PR identity footer"
    command: |
      if git log -1 --pretty=%B | grep -qE '^(Authoring-Agent|Birth-Branch): '; then
        echo "PR identity footer present"
      else
        echo "NOTE: PR missing Authoring-Agent / Birth-Branch footer lines (mergepath fold)"
      fi
  - name: "Haskell format check"
    command: |
      ormolu --mode check --ghc-opt -XImportQualifiedPost \
        $(find haskell -name "*.hs" -not -path "*/vendor/*")
  - name: "Haskell lint"
    command: 'hlint haskell --ignore-glob="haskell/vendor/**" || true'
  - name: "Haskell build"
    command: "cabal update && cabal build all -j"
  - name: "Haskell tests"
    command: |
      cabal test graph-validation-tests
      cabal test worktree-interpreter-test
      cabal test exomonad-wire-types-test
  - name: "Rust toolchain setup"
    command: |
      rustup default stable
      rustup component add clippy rustfmt
  - name: "Rust clippy"
    command: "cd rust && cargo clippy --workspace --all-targets"
  - name: "Rust fmt check"
    command: "cd rust && cargo fmt --all -- --check"
  - name: "Rust build"
    command: "cd rust && cargo build --workspace --all-targets"
  - name: "Rust tests"
    command: "cd rust && cargo test --workspace -- --skip test_cli_hook --skip test_cli_invalid_json --skip test_cli_other_hook"
  - name: "Integration: protocol golden"
    command: |
      cabal test exomonad-control-server:protocol-golden-test
      cd rust && cargo test -p exomonad-shared --test protocol_golden
