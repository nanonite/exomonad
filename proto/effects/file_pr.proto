syntax = "proto3";
package exomonad.effects.file_pr;

// File PR effects for creating/updating pull requests.

// ============================================================================
// FilePR - Create or find existing PR for current branch
// ============================================================================

message FilePrRequest {
  // PR title.
  string title = 1;
  // PR body/description.
  string body = 2;
  // Target branch (default: auto-detect from branch naming convention).
  string base_branch = 3;
}

message FilePrResponse {
  // URL of the PR.
  string pr_url = 1;
  // PR number.
  int64 pr_number = 2;
  // Head branch name.
  string head_branch = 3;
  // Base branch name.
  string base_branch = 4;
  // True if newly created, false if already existed.
  bool created = 5;
}

// ============================================================================
// LocalPR - Read entries from .exo/prs.json for local/Tangled PR flows
// ============================================================================

message LocalPrGetRequest {
  // PR number to look up.
  int64 pr_number = 1;
}

message LocalPrGetForBranchRequest {
  // Head branch to look up.
  string branch = 1;
}

message LocalPrResponse {
  // True when the local registry contains a matching PR.
  bool found = 1;
  int64 pr_number = 2;
  string head_branch = 3;
  string base_branch = 4;
  string author_agent = 5;
  string review_state = 6;
  string last_head_sha = 7;
  string reviewer_agent = 8;
}

// ============================================================================
// Service definition
// ============================================================================

service FilePrEffects {
  rpc FilePr(FilePrRequest) returns (FilePrResponse);
  rpc LocalPrGet(LocalPrGetRequest) returns (LocalPrResponse);
  rpc LocalPrGetForBranch(LocalPrGetForBranchRequest) returns (LocalPrResponse);
}
